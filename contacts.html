<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us -Kilimo Hospital </title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #1b5e20; /* Body background color */
        }

        /* Header */
        header {
            background-color: #1b5e20; /* Header background color */
            color: white;
            padding: 15px 20px;
            text-align: center;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background-color: #1b5e20 ; /* Sidebar background color */
            color: white;
            padding: 20px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px;
            margin: 5px 0;
        }

        .sidebar a:hover {
            background-color:  #1b5e20; /* Hover effect for sidebar links */
        }

        /* Main Content */
        .main-content {
            margin-left: 250px; /* Adjust for sidebar width */
            padding: 20px;
            flex: 1;
            background-color:   #218838/* Main content background color */
        }

        /* Contact Form */
        .contact-form {
            background-color: #f9f9f9; /* Light background for the form */
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 0 auto;
        }

        .contact-form h2 {
            margin-bottom: 20px;
            font-size: 24px;
            color: black;
        }

        .contact-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: black;
        }

        .contact-form input[type="text"],
        .contact-form input[type="email"],
        .contact-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        .contact-form textarea {
            resize: vertical;
            height: 150px;
        }

        .contact-form input[type="submit"] {
            background-color: #28a745;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }

        .contact-form input[type="submit"]:hover {
            background-color: #218838;
        }

        /* Contact Information */
        .contact-info {
            margin-top: 30px;
            text-align: center;
        }

        .contact-info h3 {
            font-size: 20px;
            color: white;
            margin-bottom: 15px;
        }

        .contact-info p {
            font-size: 16px;
            color: white;
            margin: 5px 0;
        }

        /* Footer */
        footer {
            background-color: var(--primary-dark);
            color: var(--white);
            padding: 40px 0 20px;
        }

        .footer-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .footer-column h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-family: 'Poppins', sans-serif;
            position: relative;
            padding-bottom: 10px;
        }

        .footer-column h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 2px;
            background-color: var(--secondary-color);
        }

        .footer-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .footer-link {
            color: var(--white);
            text-decoration: none;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-link:hover {
            color: var(--primary-light);
            transform: translateX(5px);
        }

        .footer-bottom {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .social-icons {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }

        .social-icon {
            color: var(--white);
            font-size: 1.2rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .social-icon:hover {
            color: var(--primary-light);
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 10px;
                text-align: center;
            }

            .sidebar a {
                display: inline-block;
                margin: 5px;
                padding: 8px 12px;
            }

            .main-content {
                margin-left: 0;
                padding: 10px;
            }

            .contact-form {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .sidebar a {
                display: block;
                margin: 5px 0;
            }

            .contact-form {
                padding: 15px;
            }

            .contact-form h2 {
                font-size: 20px;
            }

            .contact-form input[type="text"],
            .contact-form input[type="email"],
            .contact-form textarea {
                font-size: 14px;
            }

            .contact-form input[type="submit"] {
                font-size: 14px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Kilimo Hospital </h1>
        <p>Your Health Land, Our Priority</p>
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="Kilimohosipital.html">Home</a>
        <a href="service.html">Services</a>
        <a href="Doctors.html">Doctors</a>
        <a href="Appointments.html">Appointments</a>
        <a href="contacts.html">Contact Us</a>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Contact Form -->
        <div class="contact-form">
            <h2>Contact Us</h2>
            <form action="submit_contact.php" method="POST">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="subject">Subject:</label>
                <input type="text" id="subject" name="subject" required>

                <label for="message">Your Message:</label>
                <textarea id="message" name="message" required></textarea>

                <input type="submit" value="Send Message">
            </form>
        </div>

        

</body>
</html>
